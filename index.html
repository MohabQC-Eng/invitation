<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة خطوبة</title>
<style>
  :root{
    --lav-1:#efe9f5;
    --lav-2:#c9b7de;
    --lav-3:#a68fc9;
    --lav-4:#7c5fa8;
    --lav-deep:#5b4485;
    --leaf:#7c9473;
    --leaf-dark:#5a7052;
    --gold:#c69a5c;
    --gold-light:#e0bd85;
    --ink:#3f3c46;
    --paper:#fffdfb;
  }

  *{box-sizing:border-box;}

  body{
    width: 100vw;
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(160deg,#eae3f2 0%,#f6f2fa 45%,#ece5f2 100%);
    background-size: cover;
    background-repeat: no-repeat;
    padding:24px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:520px;
    aspect-ratio:726/1024;
    background:var(--paper) url("full_bg.jpg") center/cover no-repeat;
    border-radius:6px;
    overflow:hidden;
    box-shadow:
      0 2px 4px rgba(91,68,133,0.12),
      0 20px 45px rgba(91,68,133,0.22),
      0 0 0 1px rgba(255,255,255,0.4) inset;
  }

  .wash{
    position:absolute;
    top:28%;
    left:50%;
    transform:translateX(-50%);
    width:78%;
    height:52%;
    background:radial-gradient(ellipse at center, rgba(199,183,222,0.55) 0%, rgba(199,183,222,0.28) 45%, rgba(199,183,222,0) 72%);
    filter:blur(2px);
    pointer-events:none;
  }

  .florals{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .floral-img{
    position:absolute;
    left:0;
    width:100%;
    height:auto;
    display:block;
  }
  .floral-img.top{ top:0; }
  .floral-img.bottom{ bottom:0; }

  .content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:9% 12% 6%;
    text-align:center;
    color:var(--ink);
  }

  .title{
    margin-top:26%;
    font-family:"Brush Script MT","Segoe Script","Lucida Handwriting",cursive;
    font-size:clamp(2.1rem,7vw,2.9rem);
    color:#484554;
    letter-spacing:1px;
    font-weight:400;
  }

  .arabic-lines{
    margin-top:6%;
    font-size:clamp(.85rem,2.6vw,1.05rem);
    line-height:2.1;
    font-weight:600;
    color:var(--ink);
    max-width:90%;
  }

  .names-row{
    margin-top:6%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
  }

  .name{
    font-family:"Brush Script MT","Segoe Script","Lucida Handwriting",cursive;
    font-size:clamp(1.6rem,5.5vw,2.1rem);
    color:#484554;
    white-space:nowrap;
  }

  .rings{
    width:clamp(60px,14vw,84px);
    height:auto;
    margin:0 -6px;
  }

  .verse{
    margin-top:7%;
    font-size:clamp(.8rem,2.4vw,.98rem);
    line-height:2.05;
    font-weight:600;
    color:var(--ink);
    max-width:88%;
  }

  .date-row{
    /* margin-top:auto; */
    padding-top:10%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    font-family:Georgia,"Times New Roman",serif;
    color:#4a4752;
  }
  .date-row .day{
    font-size:clamp(1.6rem,5vw,2rem);
    letter-spacing:3px;
  }
  .date-row .num{
    font-size:clamp(2.6rem,8vw,3.4rem);
    font-weight:400;
  }
  .date-row .year{
    font-size:clamp(1.6rem,5vw,2rem);
  }
  .divider{
    width:1px;
    height:2.4em;
    background:#8d879a;
    opacity:.6;
  }

  .place{
    margin-top:4%;
    margin-bottom:8%;
    font-family:Georgia,"Times New Roman",serif;
    font-size:clamp(1rem,3.2vw,1.25rem);
    color:#4a4752;
    letter-spacing:1px;
  }

  /* ===== popup overlay ===== */
  .overlay{
    position:fixed;
    inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(160deg,#eae3f2 0%,#f6f2fa 45%,#ece5f2 100%);
    transition:opacity .7s ease, visibility .7s ease;
  }
  .overlay.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .overlay-card{
    position:relative;
    width:min(90%,420px);
    aspect-ratio:726/1024;
    max-height:88vh;
    background:var(--paper) url("full_bg.jpg") center/cover no-repeat;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 20px 45px rgba(91,68,133,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .open-btn{
    position:relative;
    z-index:3;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:var(--paper);
    border:2px solid var(--gold);
    border-radius:50%;
    width:190px;
    height:190px;
    cursor:pointer;
    color:var(--lav-deep);
    transition:transform .3s ease, box-shadow .3s ease;
    box-shadow:0 6px 18px rgba(124,95,168,0.25);
    padding:14px;
  }
  .open-btn:hover{
    transform:scale(1.06);
    box-shadow:0 10px 26px rgba(124,95,168,0.35);
  }
  .open-btn .btn-label{
    font-weight:700;
    font-size:1rem;
    color:var(--lav-deep);
    line-height:1.5;
    text-align:center;
  }
  .open-btn .btn-names{
    font-family:"Brush Script MT","Segoe Script","Lucida Handwriting",cursive;
    font-size:1.05rem;
    color:#5b4a70;
    line-height:1.3;
  }
  .open-btn .btn-cta{
    margin-top:2px;
    font-size:.85rem;
    font-weight:700;
    letter-spacing:.5px;
    color:var(--gold);
    border-top:1px solid rgba(198,154,92,0.5);
    padding-top:5px;
  }
  .open-btn svg{
    width:34px;
    height:auto;
    margin-bottom:2px;
  }
  .card{
    transition:opacity .8s ease .1s;
  }
  .card.reveal-hidden{
    opacity:0;
  }
</style>
</head>
<body>

<audio id="song" src="a1.mp3" preload="auto" loop></audio>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <button class="open-btn" id="openBtn" aria-label="افتح الدعوة">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="38" cy="30" r="18" fill="none" stroke="#c69a5c" stroke-width="6"/>
        <circle cx="62" cy="30" r="18" fill="none" stroke="#e0bd85" stroke-width="6"/>
      </svg>
      <span class="btn-label">تشرفوا بحضور خطوبة</span>
      <span class="btn-names">Ahmed &amp; Menna</span>
      <span class="btn-cta">اضغط هنا</span>
    </button>
  </div>
</div>

<div class="card reveal-hidden" id="card">

  <div class="content">
    <div class="title">Get Engaged</div>

    <div class="arabic-lines">
      في ليلة يتكللها الفرح والسرور نتشرف<br>
      بدعوتكم حضور خطوبه
    </div>

    <div class="names-row">
      <span class="name">Menna</span>
      <svg class="rings" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
      </svg>
      <span class="name">Ahmed</span>
    </div>

    <div class="verse">
      جاء قاصدا حلالى طالبا رفقتى فمرحبا به فى<br>
      ثنايا حياتى وسنين عمرى
    </div>

    <div class="date-row">
      <span class="day">2026</span>
      <span class="divider"></span>
      <span class="num">13</span>
      <span class="divider"></span>
      <span class="year">MON</span>
    </div>

    <div class="place">at home</div>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');
  const btn = document.getElementById('openBtn');
  const song = document.getElementById('song');

  btn.addEventListener('click', () => {
    song.play().catch(() => {});
    overlay.classList.add('hidden');
    card.classList.remove('reveal-hidden');
  });
</script>

</body>
</html>
